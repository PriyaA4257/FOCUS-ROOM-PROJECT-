kind = "web"
previewPath = "/"
title = "Focus Room – Virtual Study Space"
version = "1.0.0"
id = "artifacts/focus-room"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23959

[services.development]
run = "pnpm --filter @workspace/focus-room run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/focus-room", "run", "build" ]
publicDir = "artifacts/focus-room/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23959"
BASE_PATH = "/"
